[workspace]
resolver = "2"
members = [
    "src/nvim-rs",
    "src/nvim-rs/arabic",
    "src/nvim-rs/buffer",
    "src/nvim-rs/charset",
    "src/nvim-rs/cmdhist",
    "src/nvim-rs/collections",
    "src/nvim-rs/encoding",
    "src/nvim-rs/ex_docmd",
    "src/nvim-rs/fileio",
    "src/nvim-rs/grid",
    "src/nvim-rs/help",
    "src/nvim-rs/indent",
    "src/nvim-rs/keycodes",
    "src/nvim-rs/mark",
    "src/nvim-rs/math",
    "src/nvim-rs/mbyte",
    "src/nvim-rs/memory",
    "src/nvim-rs/memutil",
    "src/nvim-rs/menu",
    "src/nvim-rs/ops",
    "src/nvim-rs/os",
    "src/nvim-rs/path",
    "src/nvim-rs/profile",
    "src/nvim-rs/register",
    "src/nvim-rs/spell",
    "src/nvim-rs/strings",
    "src/nvim-rs/eval",
    "src/nvim-rs/utf8proc",
    "src/nvim-rs/version",
    "src/nvim-rs/window",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/neovim/neovim"

[workspace.lints.rust]
# Note: unsafe_code is allowed at crate level for FFI, but should be minimized

[workspace.lints.clippy]
all = "warn"
pedantic = "warn"
nursery = "warn"

[profile.release]
lto = true
codegen-units = 1
