[formatter.rustfmt]
command = "rustfmt"
includes = ["*.rs"]

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = ["*.md"]

[formatter.stylua]
command = "stylua"
options = ["--respect-ignores"]
includes = ["*.lua"]

[formatter.just]
command = "just"
options = ["--fmt", "--justfile"]
includes = ["justfile", "**/justfile", "*.just"]
no-positional-arg-support = true
