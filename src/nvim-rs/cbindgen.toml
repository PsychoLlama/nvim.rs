# cbindgen configuration for generating C headers from Rust

language = "C"
include_guard = "NVIM_RS_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not edit manually. */"

[fn]
prefix = ""

[struct]
rename_fields = "SnakeCase"

[enum]
rename_variants = "ScreamingSnakeCase"

[parse]
parse_deps = true
include = ["nvim-charset", "nvim-cmdhist", "nvim-encoding", "nvim-help", "nvim-indent", "nvim-keycodes", "nvim-math", "nvim-mbyte", "nvim-memutil", "nvim-menu", "nvim-path", "nvim-profile", "nvim-strings"]

[export]
include = ["rs_xfpclassify", "rs_xisinf", "rs_xisnan", "rs_xctz", "rs_xpopcount",
           "rs_vim_append_digit_int", "rs_trim_to_int", "rs_is_power_of_two",
           "rs_num_divide", "rs_num_modulus",
           "rs_utf_char2len", "rs_utf_char2bytes", "rs_utf_byte2len",
           "rs_utf_ptr2char", "rs_utf_ptr2len", "rs_utf_ptr2len_len",
           "rs_utf_valid_string",
           "rs_utf_eat_space", "rs_utf_allow_break_before", "rs_utf_allow_break_after", "rs_utf_allow_break",
           "rs_utf_printable",
           "rs_vim_ispathsep", "rs_vim_ispathsep_nocolon", "rs_vim_ispathlistsep",
           "rs_path_head_length", "rs_is_path_head", "rs_get_past_head",
           "rs_path_is_absolute", "rs_path_tail", "rs_path_is_url",
           "rs_path_has_drive_letter", "rs_path_with_url", "rs_vim_isAbsName",
           "rs_vim_stricmp", "rs_vim_strnicmp", "rs_striequal", "rs_vim_strchr",
           "rs_has_non_ascii", "rs_has_non_ascii_len", "rs_concat_str", "rs_sort_strings", "rs_valid_name",
           "rs_find_tty_option_end", "rs_is_tty_option",
           "rs_skipwhite", "rs_skipwhite_len", "rs_skipdigits", "rs_skipbin",
           "rs_skiphex", "rs_skiptodigit", "rs_skiptobin", "rs_skiptohex",
           "rs_skiptowhite", "rs_skiptowhite_esc", "rs_getwhitecols", "rs_skip_to_newline",
           "rs_hex2nr", "rs_hexhex2nr", "rs_nr2hex",
           "rs_tabstop_padding", "rs_indent_size_ts",
           "rs_name_to_mod_mask", "rs_handle_x_keys",
           "rs_xstrnlen", "rs_xstrchrnul", "rs_xmemscan", "rs_strcnt", "rs_memcnt",
           "rs_xmemrchr", "rs_strequal", "rs_strnequal",
           "rs_hash_hash", "rs_hash_hash_len",
           "rs_hist_char2type",
           "rs_profile_zero", "rs_profile_divide", "rs_profile_add", "rs_profile_sub",
           "rs_profile_self", "rs_profile_equal", "rs_profile_signed", "rs_profile_cmp",
           "rs_menu_is_winbar", "rs_menu_is_popup", "rs_menu_is_toolbar",
           "rs_menu_is_menubar", "rs_menu_is_separator",
           "rs_help_heuristic",
           "rs_base64_encode", "rs_base64_decode",
           "nvim_rs_version"]
