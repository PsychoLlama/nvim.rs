# cbindgen configuration for nvim-math

language = "C"
include_guard = "NVIM_RS_MATH_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not edit manually. */"

header = """
#include <stdint.h>

/* Return values matching nvim's OK/FAIL */
#define RS_OK   1
#define RS_FAIL 0

/* FP classification constants */
#define RS_FP_NAN       0
#define RS_FP_INFINITE  1
#define RS_FP_ZERO      2
#define RS_FP_SUBNORMAL 3
#define RS_FP_NORMAL    4
"""

[export]
exclude = ["OK", "FAIL", "FP_NORMAL", "FP_SUBNORMAL", "FP_ZERO", "FP_INFINITE", "FP_NAN"]
