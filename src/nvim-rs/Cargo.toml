[package]
name = "nvim-rs"
description = "Rust components for Neovim"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
crate-type = ["staticlib", "rlib"]

[lints]
workspace = true

[dependencies]
nvim-charset = { path = "charset" }
nvim-cmdhist = { path = "cmdhist" }
nvim-indent = { path = "indent" }
nvim-keycodes = { path = "keycodes" }
nvim-math = { path = "math" }
nvim-mbyte = { path = "mbyte" }
nvim-memutil = { path = "memutil" }
nvim-menu = { path = "menu" }
nvim-path = { path = "path" }
nvim-profile = { path = "profile" }
nvim-strings = { path = "strings" }

[build-dependencies]
cbindgen = "0.27"
