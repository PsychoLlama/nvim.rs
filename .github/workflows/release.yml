name: Release

# Linux-only CalVer releases, triggered by pushing a CalVer-shaped tag. The
# tag is the version — build date plus short commit sha, e.g.
# `2026.07.18-a1b2c3d4e` — and is created locally with scripts/tag-release.sh.
on:
  push:
    tags:
      - "20[0-9][0-9].[0-9][0-9].[0-9][0-9]-*"

# Needed to publish the GitHub Release. The tag already exists (it is the
# trigger); this job creates a Release pointing at it, never a new tag.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Build inside the devshell for the pinned toolchain and $NVIM_DEPS_PREFIX,
    # exactly as ci.yml does — but compile with cargo (`just package`), not the
    # nix package derivation.
    defaults:
      run:
        shell: nix develop --command bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: false
      # Same key as ci.yml on purpose: the crate downloads are profile-agnostic,
      # so a release run inherits whatever the last push already fetched.
      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # Release-only, and deliberately with no fallback to the dev cache: the
      # two share no compiled artifacts (target/debug vs target/release), so
      # restoring one for the other only paid a multi-hundred-MB download to
      # recompile from scratch anyway.
      - name: Cache build directory
        uses: actions/cache@v6
        with:
          path: target/
          key: ${{ runner.os }}-target-release-${{ hashFiles('**/Cargo.lock', 'flake.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-release-

      # The version is the pushed tag verbatim (`2000.01.15-<short-sha>`):
      # scripts/tag-release.sh already baked the UTC date and the pinned sha
      # into it. The tarball name derives from this.
      - name: Compute version
        id: version
        run: |
          version='${{ github.ref_name }}'
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "Release version: $version"

      # Enter the devshell once for its side effect — realising the flake's
      # store paths — as its own step, so that download time is attributed here
      # and doesn't inflate the packaging step's timing in the CI summary.
      - name: Hydrate the nix store
        run: 'true'

      # Cargo release build, then assemble the relocatable tarball under
      # target/dist (bin/ + runtime + tree-sitter parsers).
      - name: Build and package
        id: package
        run: |
          version='${{ steps.version.outputs.version }}'
          just package "$version"
          echo "tarball=target/dist/nvim-$version-x86_64-linux.tar.gz" >>"$GITHUB_OUTPUT"

      # Publish the Release against the tag that triggered this run, attaching
      # the tarball. Runs in the runner's plain shell (not the devshell) for the
      # preinstalled gh CLI. `gh release create` reuses the existing tag rather
      # than creating one, and fails loudly if a Release for it already exists
      # rather than clobbering a published one. The notes are the annotated
      # tag's body verbatim — scripts/tag-release.sh puts this release's
      # CHANGELOG.md section there.
      - name: Publish GitHub Release
        shell: bash -euo pipefail {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version='${{ steps.version.outputs.version }}'
          git tag --list --format='%(contents:body)' "$version" > "$RUNNER_TEMP/notes.md"
          gh release create "$version" \
            --title "$version" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            '${{ steps.package.outputs.tarball }}'
